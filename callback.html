    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIMA Health - Transaction Result</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .container {
            background: white;
            border-radius: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 430px; /* Optimal for iPhone Pro Max */
            width: 100%;
            min-height: 100vh;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        @media (min-width: 431px) {
            body {
                padding: 20px;
            }
            .container {
                min-height: auto;
                height: auto;
                max-height: 95vh;
                border-radius: 24px;
            }
        }

        @media (min-width: 501px) {
            .container {
                height: auto;
                max-height: 98vh;
                border-radius: 20px;
            }
        }

        .logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 5px;
        }

        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
            max-width: 150px;
            background: white;
            padding: 6px;
            border-radius: 8px;
        }

        .heading {
            display: block;
            margin-bottom: 15px;
        }

        .heading h1 {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            letter-spacing: -0.5px;
        }

        .doctor-image {
            width: auto;
            max-width: 100%;
            max-height: 35vh;
            height: auto;
            margin: 0 auto 10px;
            display: block;
            object-fit: contain;
        }

        .result-container {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border: 3px solid #ff6b6b;
            border-radius: 18px;
            padding: 18px;
            margin-top: 12px;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.25);
            text-align: left;
            transition: all 0.3s ease;
        }

        .result-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #ddd;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 15px;
            color: #333;
            font-weight: 700;
            word-break: break-all;
        }

        .status-success {
            color: #1db97b !important;
        }

        .status-error {
            color: #e74c3c !important;
        }

        .home-btn {
            width: 100%;
            background: linear-gradient(135deg, #4ecca7 0%, #3aab8e 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(78, 204, 167, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 204, 167, 0.4);
        }

        @media (max-width: 480px) {
            body { padding: 5px; }
            .container { padding: 15px 12px; }
            .logo-img { height: 40px; }
            .heading h1 { font-size: 24px; }
            .result-container { padding: 15px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-section">
            <img src="bima_logo.jpg" alt="BIMA" class="logo-img">
        </div>

        <div class="heading">
            <h1>Transaction Result</h1>
        </div>

        <img src="doctor.webp" alt="Specialist Doctor" class="doctor-image">

        <div class="result-container" id="resultContainer">
            <div class="result-item">
                <div class="result-label">Status</div>
                <div class="result-value" id="resStatus">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">Message</div>
                <div class="result-value" id="resMessage">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">Transaction Ref No</div>
                <div class="result-value" id="resTrxRefNo">-</div>
            </div>
        </div>

        <a href="/" class="home-btn">Return to Home</a>
    </div>

    <script>
        // Parse URL parameters and display them
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status') || 'N/A';
            const message = params.get('message') || 'No message provided';
            const trxRefNo = params.get('trxRefNo') || 'N/A';

            const statusEl = document.getElementById('resStatus');
            const messageEl = document.getElementById('resMessage');
            const trxRefNoEl = document.getElementById('resTrxRefNo');

            // Custom Message Logic based on Status
            let displayMessage = message;
            let displayStatus = status;

            if (status === '0') {
                displayStatus = "Failed!";
                displayMessage = "JazzCash Account Linkage Failed!";
            } else if (status === '1') {
                displayStatus = "Successful!";
                displayMessage = "JazzCash Account Linked Successfully!";
            }

            statusEl.textContent = displayStatus;
            messageEl.textContent = displayMessage;
            
            trxRefNoEl.textContent = trxRefNo;

            // Highlight border and text color for success
            if (status === '1' || status.toLowerCase().includes('success') || status === '000') {
                statusEl.classList.add('status-success');
                const container = document.getElementById('resultContainer');
                container.style.borderColor = '#4ecca7';
                container.style.boxShadow = '0 8px 25px rgba(78, 204, 167, 0.25)';

                // Trigger TikTok Subscribe event on success
                if (typeof ttq !== 'undefined') {
                    ttq.track('Subscribe', {
                        value: 300,
                        currency: 'PKR',
                        content_type: 'insurance',
                        content_name: 'BIMA Insurance',
                        description: 'Monthly Insurance Subscription'
                    });
                }
            } else if (status === '0' || status.toLowerCase().includes('fail') || status.toLowerCase().includes('error')) {
                statusEl.classList.add('status-error');

                // Trigger TikTok failure event
                if (typeof ttq !== 'undefined') {
                    ttq.track('Subscribe_Failed', {
                        content_type: 'insurance',
                        content_name: 'BIMA Insurance',
                        description: 'Monthly Insurance Subscription Failed'
                    });
                }
            }
        });
    </script>
</body>
</html>
