<body>
    <div class="container">
        <div class="logo-section">
            <img src="bima_logo.jpg" alt="BIMA" class="logo-img">

        </div>

        <div class="heading">
            <h1>GET CONNECTED</h1>
            <p>With Specialist <span class="highlight">Doctors in</span></p>
            <p><span class="highlight">Just a Click</span></p>
        </div>

        <img src="doctor.webp" alt="Specialist Doctor" class="doctor-image">

        <form class="form-container" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label class="form-label">Phone Number for Subscription:</label>
                <div class="phone-input-wrapper">
                    <select class="country-code" id="countryCode">
                        <option value="+92">+92</option>
                    </select>
                    <input type="tel" class="phone-number" id="phoneNumber" placeholder="3XXXXXXXXX" required
                        pattern="[0-9]{10}" title="Please enter a 10-digit phone number">
                </div>
            </div>

            <button type="submit" class="continue-btn">Activate Now</button>
            <p class="subscription-info">
                Subscribe to Product
                <span class="subscription-product">BIMA MHealth @Rs.300/month</span>
            </p>


            <p class="trust-text">By continuing, you agree to recurring charges and our <a
                    href="https://customerportal.milvikpakistan.com/telemedicine/terms-and-conditions"
                    target="_blank">Privacy Policy and Terms</a>.</p>
        </form>
    </div>

    <!-- Toast notification -->
    <div id="toastMsg" style="
        display: none;
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: #fff;
        padding: 12px 24px;
        border-radius: 50px;
        font-size: 13px;
        font-weight: 600;
        z-index: 9999;
        box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        transition: opacity 0.3s ease;
        max-width: 90vw;
        text-align: center;
    " id="toastMsg"></div>

    <script>
        /* ── Utility: Toast ── */
        function showToast(message, isSuccess) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = message;
            toast.style.background = isSuccess ? '#1db97b' : '#e74c3c';
            toast.style.display = 'block';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.style.display = 'none'; }, 400);
            }, 4000);
        }

        /* ── Utility: Button loading state ── */
        function setLoading(isLoading) {
            const btn = document.querySelector('.continue-btn');
            btn.disabled = isLoading;
            btn.textContent = isLoading ? 'Please wait…' : 'Activate Now';
            btn.style.opacity = isLoading ? '0.7' : '1';
            btn.style.cursor = isLoading ? 'not-allowed' : 'pointer';
        }

        /* ── Main form handler ── */
        async function handleSubmit(event) {
            event.preventDefault();

            const countryCode = document.getElementById('countryCode').value; // e.g. "+92"
            const phoneNumber = document.getElementById('phoneNumber').value.trim();

            if (!phoneNumber || phoneNumber.length < 10) {
                showToast('Please enter a valid 10-digit phone number.', false);
                return;
            }

            // Build MSISDN in local format: 0 + 10-digit number = e.g. "03001234567"
            const msisdn = '0' + phoneNumber;
            console.log('Submitting MSISDN:', msisdn);

            setLoading(true);

            try {
                // POST to https://bcare.milvikpakistan.com/authorize/tp/login (proxied via /api/token)
                const tokenRes = await fetch('/api/token', { method: 'POST' });
                const tokenData = await tokenRes.json().catch(() => ({}));
                console.log('Token response:', tokenData);

                if (!tokenRes.ok) {
                    throw new Error(tokenData.message || tokenData.error || 'Token request failed: ' + tokenRes.status);
                }

                // Token is nested under result.token
                const authToken = (tokenData.result && tokenData.result.token)
                    || tokenData.token
                    || tokenData.auth_token
                    || tokenData.authToken
                    || tokenData.access_token
                    || tokenData.accessToken;

                if (!authToken) {
                    throw new Error('Auth token not found in response: ' + JSON.stringify(tokenData));
                }

                console.log('✅ Auth token acquired:', authToken);

                // ── Step 2: Service search ──
                const serviceRes = await fetch(`/api/service-search/${msisdn}`, {
                    method: 'GET',
                    headers: { 'auth-token': authToken }
                });
                const serviceData = await serviceRes.json().catch(() => ({}));
                console.log('✅ Service response:', serviceData);

                if (!serviceRes.ok) {
                    throw new Error(serviceData.message || serviceData.error || 'Service request failed: ' + serviceRes.status);
                }

                // ── Step 3: Build & submit JazzCash DTC form ──
                // Extract transId from service search response (try common field names)
                const transId = (serviceData.result && (serviceData.result.transId || serviceData.result.requestId || serviceData.result.transaction_id))
                    || serviceData.transId
                    || serviceData.requestId
                    || serviceData.transaction_id
                    || '';

                console.log('transId:', transId);

                // Get form fields + server-computed HMAC hash
                const formRes = await fetch(`/api/jazzcash-form?msisdn=${encodeURIComponent(msisdn)}&transId=${encodeURIComponent(transId)}`);
                const formData = await formRes.json();
                console.log('✅ JazzCash form data:', formData);

                if (!formRes.ok) {
                    throw new Error(formData.error || 'Failed to build JazzCash form');
                }

                showToast('✓ Redirecting to payment…', true);

                // Build hidden form and auto-submit (redirect to JazzCash)
                const jcForm = document.createElement('form');
                jcForm.method = 'POST';
                jcForm.action = formData.actionUrl;

                const exclude = ['actionUrl'];
                Object.entries(formData).forEach(([key, val]) => {
                    if (exclude.includes(key)) return;
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = val || '';
                    jcForm.appendChild(input);
                });

                document.body.appendChild(jcForm);
                localStorage.setItem('jazzcash_source', 'index.html');
                setTimeout(() => jcForm.submit(), 800); // small delay so toast is visible


            } catch (err) {
                console.error('Activation error:', err);
                showToast('⚠ ' + (err.message || 'Something went wrong. Please try again.'), false);
            } finally {
                setLoading(false);
            }
        }

        /* ── Phone number input: digits only ── */
        document.getElementById('phoneNumber').addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        /* ── Clear icon (if used) ── */
        const errorIcon = document.querySelector('.error-icon');
        if (errorIcon) {
            errorIcon.addEventListener('click', function () {
                document.getElementById('phoneNumber').value = '';
                document.getElementById('phoneNumber').focus();
            });
        }

    </script>
