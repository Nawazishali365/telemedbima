<body>
    <div class="container">
        <div class="logo-section">
            <img src="bima_logo.jpg" alt="BIMA" class="logo-img">
        </div>

        <div class="heading">
            <h1>GET CONNECTED</h1>
            <p>With Specialist <span class="highlight">Doctors in</span></p>
            <p><span class="highlight">Just a Click</span></p>
        </div>

        <img src="doctor.webp" alt="Specialist Doctor" class="doctor-image">

        <form class="form-container" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label class="form-label">Phone Number for Video Consultation:</label>
                <div class="phone-input-wrapper">
                    <select class="country-code" id="countryCode">
                        <option value="+92">+92</option>
                    </select>
                    <input type="tel" class="phone-number" id="phoneNumber" placeholder="3XXXXXXXXX" required
                        pattern="[0-9]{10}" title="Please enter a 10-digit phone number">
                </div>
            </div>

            <button type="submit" class="continue-btn">Consult Doctor Now</button>
            <p class="subscription-info">
                BIMA Telemedicine Video Consultation
                <span class="subscription-product">Active Subscribers Only</span>
            </p>

            <p class="trust-text">By proceeding, you verify that you are active and accept our <a
                    href="https://customerportal.milvikpakistan.com/telemedicine/terms-and-conditions"
                    target="_blank">Privacy Policy and Terms</a>.</p>
        </form>
    </div>

    <!-- Toast notification -->
    <div id="toastMsg" style="
        display: none;
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: #fff;
        padding: 12px 24px;
        border-radius: 50px;
        font-size: 13px;
        font-weight: 600;
        z-index: 9999;
        box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        transition: opacity 0.3s ease;
        max-width: 90vw;
        text-align: center;
    "></div>

    <script>
        /* ── Utility: Toast ── */
        function showToast(message, isSuccess) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = message;
            toast.style.background = isSuccess ? '#1db97b' : '#e74c3c';
            toast.style.display = 'block';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.style.display = 'none'; }, 400);
            }, 4000);
        }

        /* ── Utility: Button loading state ── */
        function setLoading(isLoading) {
            const btn = document.querySelector('.continue-btn');
            btn.disabled = isLoading;
            btn.textContent = isLoading ? 'Checking Eligibility…' : 'Consult Doctor Now';
            btn.style.opacity = isLoading ? '0.7' : '1';
            btn.style.cursor = isLoading ? 'not-allowed' : 'pointer';
        }

        /* ── Main form handler ── */
        async function handleSubmit(event) {
            event.preventDefault();

            const countryCode = document.getElementById('countryCode').value; // e.g. "+92"
            const phoneNumber = document.getElementById('phoneNumber').value.trim();

            if (!phoneNumber || phoneNumber.length < 10) {
                showToast('Please enter a valid 10-digit phone number.', false);
                return;
            }

            // Build MSISDN in local format: 0 + 10-digit number = e.g. "03001234567"
            const msisdn = '0' + phoneNumber;
            console.log('Submitting MSISDN:', msisdn);

            setLoading(true);

            // Track button click / attempt to consult
            console.log('Tracking Event: video_consultation_button_click');
            if (typeof gtag === 'function') {
                gtag('event', 'video_consultation_button_click');
            }
            if (typeof fbq === 'function') {
                fbq('trackCustom', 'video_consultation_button_click');
            }
            if (typeof ttq === 'function') {
                ttq.track('video_consultation_button_click');
            }

            try {
                // Call the new Python Flask backend /api/grant-access endpoint
                const response = await fetch('/api/grant-access', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ msisdn: msisdn })
                });

                let data = {};
                let isJson = false;
                try {
                    const text = await response.text();
                    try {
                        data = JSON.parse(text);
                        isJson = true;
                    } catch (e) {
                        data = { message: text };
                    }
                } catch (e) {
                    console.error("Failed to read response content:", e);
                }

                console.log('Grant access response:', data);

                // Handle the case where the customer is not registered (eligibility returns false)
                if (data.status === 'unregistered') {
                    showToast('⚠ ' + (data.message || 'No product is registered on the provider msisdn.'), false);
                    setTimeout(() => {
                        window.location.href = data.redirect_url || 'https://services.jazz.com.pk/signin/BIMAMHealth?ref=1&var=2&camp=BIMAMHealth_Jazz1';
                    }, 2500); // Allow time to see the toast notification
                    return;
                }

                if (!response.ok || data.status === 'error') {
                    // Extract message from JSON, otherwise fallback to HTML status code or default
                    const rawMsg = data.message || '';
                    const cleanMsg = isJson && rawMsg ? rawMsg : `Server returned error ${response.status} (${response.statusText || 'Bad Gateway'})`;
                    throw new Error(cleanMsg);
                }

                showToast('✓ Redirecting to video consultation…', true);

                // Redirect to deep_link returned from Python server
                setTimeout(() => {
                    window.location.href = data.deep_link;
                }, 1000); // Small delay to let the toast be visible

            } catch (err) {
                console.error('Telemedicine Redirect Error:', err);
                showToast('⚠ ' + (err.message || 'Verification or authorization failed. Please try again.'), false);
            } finally {
                setLoading(false);
            }
        }

        /* ── Phone number input: digits only ── */
        document.getElementById('phoneNumber').addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        /* ── Event tracking helper: msisdn enter ── */
        let msisdnTracked = false;
        function trackMsisdnEnter() {
            if (msisdnTracked) return;
            msisdnTracked = true;
            console.log('Tracking Event: msisdn_field');
            if (typeof gtag === 'function') {
                gtag('event', 'msisdn_field');
            }
            if (typeof fbq === 'function') {
                fbq('trackCustom', 'msisdn_field');
            }
            if (typeof ttq === 'function') {
                ttq.track('msisdn_field');
            }
        }

        const phoneInput = document.getElementById('phoneNumber');
        if (phoneInput) {
            phoneInput.addEventListener('click', trackMsisdnEnter);
            phoneInput.addEventListener('focus', trackMsisdnEnter);
            phoneInput.addEventListener('input', trackMsisdnEnter);
        }
    </script>
