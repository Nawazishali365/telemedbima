    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Subtle premium pattern for the white background */
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1080 / 1920;
            background-image: url('Landing%20page%20final.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            background-color: #fff;
            margin: 0 auto;
        }

        /* Better responsive scaling */
        @media (min-width: 501px) {
            .container {
                border-radius: 24px;
                margin-top: 20px;
                margin-bottom: 20px;
                height: 95vh;
                width: auto; /* Width auto ensures it scales based on height */
                aspect-ratio: 1080 / 1920; /* Lock to image proportions */
            }
        }

        @media (max-width: 500px) {
            .container {
                /* Preserve aspect ratio perfectly so inputs never misalign */
                height: auto;
                width: 100%;
                aspect-ratio: 1080 / 1920;
            }
        }

        /* ── Beautiful Inputs & Buttons ── */

        .phone-input-wrapper {
            position: absolute;
            top: 74.2%;
            left: 28%;
            width: 61%;
            height: 5.4%;
        }

        .country-code {
            display: none;
        }

        .phone-number {
            width: 100%;
            height: 100%;
            background-color: #f7eed7; /* Blends perfectly into the cream painted box */
            border: none;
            border-top-right-radius: 50px; /* Curves to match the right edge of the cream box */
            border-bottom-right-radius: 50px;
            outline: none;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 600;
            color: #1e293b;
            padding: 0 20px 0 10px;
            box-shadow: inset 0 -2px 0 transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .phone-number::placeholder {
            color: #94a3b8;
            font-weight: 500;
        }

        .phone-number:focus {
            background-color: #ffffff; /* Brighten when typing */
            box-shadow: inset 0 -3px 0 #4ecca7; /* Sleek bottom underline on focus */
        }

        .continue-btn {
            position: absolute;
            top: 82.5%;
            left: 9%;
            width: 82%;
            height: 6.2%;
            background: linear-gradient(135deg, #4ecca7 0%, #3aab8e 100%);
            color: #ffffff;
            border: none;
            border-radius: 50px;
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 8px 25px rgba(78, 204, 167, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .continue-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(78, 204, 167, 0.5);
            background: linear-gradient(135deg, #59d5b2 0%, #3ebd9c 100%);
        }

        .continue-btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 15px rgba(78, 204, 167, 0.3);
        }

        .continue-btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;

            left: 10%;

            width: 100%;
            height: 100%;
            background: transparent;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .trust-text a:hover {
            background: rgba(0, 0, 0, 0.05);

<body>
    <div class="container">
        <form id="subscriptionForm" onsubmit="handleSubmit(event)">
            <div class="phone-input-wrapper">
                <select class="country-code" id="countryCode">
                    <option value="+92">+92</option>
                </select>
                <input type="tel" class="phone-number" id="phoneNumber" placeholder="3XXXXXXXXX" required
                    pattern="[0-9]{10}" title="Please enter a 10-digit phone number">
            </div>

            <button type="submit" class="continue-btn">Activate Now</button>

            <p class="trust-text">
                <a href="https://customerportal.milvikpakistan.com/telemedicine/terms-and-conditions"
                    target="_blank"></a>
            </p>
        </form>
    </div>

    <!-- Toast notification -->
    <div id="toastMsg" style="
        display: none;
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: #fff;
        padding: 12px 24px;
        border-radius: 50px;
        font-size: 13px;
        font-weight: 600;
        z-index: 9999;
        box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        transition: opacity 0.3s ease;
        max-width: 90vw;
        text-align: center;
    "></div>

    <script>
        /* ── Utility: Toast ── */
        function showToast(message, isSuccess) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = message;
            toast.style.background = isSuccess ? '#1db97b' : '#e74c3c';
            toast.style.display = 'block';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.style.display = 'none'; }, 400);
            }, 4000);
        }

        /* ── Utility: Button loading state ── */
        function setLoading(isLoading) {
            const btn = document.querySelector('.continue-btn');
            btn.disabled = isLoading;
            btn.textContent = isLoading ? 'Please wait…' : 'Activate Now';
            btn.style.opacity = isLoading ? '0.7' : '1';
            btn.style.cursor = isLoading ? 'not-allowed' : 'pointer';
        }

        /* ── Main form handler ── */
        async function handleSubmit(event) {
            event.preventDefault();

            const countryCode = document.getElementById('countryCode').value; // e.g. "+92"
            const phoneNumber = document.getElementById('phoneNumber').value.trim();

            if (!phoneNumber || phoneNumber.length < 10) {
                showToast('Please enter a valid 10-digit phone number.', false);
                return;
            }

            // Build MSISDN in local format: 0 + 10-digit number = e.g. "03001234567"
            const msisdn = '0' + phoneNumber;
            console.log('Submitting MSISDN:', msisdn);

            setLoading(true);

            try {
                // POST to https://bcare.milvikpakistan.com/authorize/tp/login (proxied via /api/token)
                const tokenRes = await fetch('/api/token', { method: 'POST' });
                const tokenData = await tokenRes.json().catch(() => ({}));
                console.log('Token response:', tokenData);

                if (!tokenRes.ok) {
                    throw new Error(tokenData.message || tokenData.error || 'Token request failed: ' + tokenRes.status);
                }

                // Token is nested under result.token
                const authToken = (tokenData.result && tokenData.result.token)
                    || tokenData.token
                    || tokenData.auth_token
                    || tokenData.authToken
                    || tokenData.access_token
                    || tokenData.accessToken;

                if (!authToken) {
                    throw new Error('Auth token not found in response: ' + JSON.stringify(tokenData));
                }

                console.log('✅ Auth token acquired:', authToken);

                // ── Step 2: Service search ──
                const serviceRes = await fetch(`/api/service-search/${msisdn}`, {
                    method: 'GET',
                    headers: { 'auth-token': authToken }
                });
                const serviceData = await serviceRes.json().catch(() => ({}));
                console.log('✅ Service response:', serviceData);

                if (!serviceRes.ok) {
                    throw new Error(serviceData.message || serviceData.error || 'Service request failed: ' + serviceRes.status);
                }

                // ── Step 3: Build & submit JazzCash DTC form ──
                // Extract transId from service search response (try common field names)
                const transId = (serviceData.result && (serviceData.result.transId || serviceData.result.requestId || serviceData.result.transaction_id))
                    || serviceData.transId
                    || serviceData.requestId
                    || serviceData.transaction_id
                    || '';

                console.log('transId:', transId);

                // Get form fields + server-computed HMAC hash
                const formRes = await fetch(`/api/jazzcash-form?msisdn=${encodeURIComponent(msisdn)}&transId=${encodeURIComponent(transId)}`);
                const formData = await formRes.json();
                console.log('✅ JazzCash form data:', formData);

                if (!formRes.ok) {
                    throw new Error(formData.error || 'Failed to build JazzCash form');
                }

                showToast('✓ Redirecting to payment…', true);

                // Build hidden form and auto-submit (redirect to JazzCash)
                const jcForm = document.createElement('form');
                jcForm.method = 'POST';
                jcForm.action = formData.actionUrl;

                const exclude = ['actionUrl'];
                Object.entries(formData).forEach(([key, val]) => {
                    if (exclude.includes(key)) return;
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = val || '';
                    jcForm.appendChild(input);
                });

                document.body.appendChild(jcForm);
                localStorage.setItem('jazzcash_source', 'index2.html');
                setTimeout(() => jcForm.submit(), 800); // small delay so toast is visible


            } catch (err) {
                console.error('Activation error:', err);
                showToast('⚠ ' + (err.message || 'Something went wrong. Please try again.'), false);
            } finally {
                setLoading(false);
            }
        }

        /* ── Phone number input: digits only ── */
        document.getElementById('phoneNumber').addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        /* ── Clear icon (if used) ── */
        const errorIcon = document.querySelector('.error-icon');
        if (errorIcon) {
            errorIcon.addEventListener('click', function () {
                document.getElementById('phoneNumber').value = '';
                document.getElementById('phoneNumber').focus();
            });
        }

    </script>
